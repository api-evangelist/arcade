naftiko: 1.0.0-alpha2
info:
  label: Arcade Engine — Tools
  description: 'Tools surface — 9 operations. Lead operation: List Formatted Static Tools. Self-contained Naftiko capability covering one Arcade business surface.'
  tags:
    - Arcade
    - Engine
    - Tools
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
  - namespace: env
    keys:
      ARCADE_API_KEY: ARCADE_API_KEY
capability:
  consumes:
    - type: http
      namespace: engine-tools
      baseUri: https://api.arcade.dev
      description: Arcade Engine — Tools business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.ARCADE_API_KEY}}'
      resources:
        - name: v1-formatted-tools
          path: /v1/formatted_tools
          operations:
            - name: tools-list-formatted
              method: GET
              description: List Formatted Static Tools
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: toolkit
                  in: query
                  type: string
                  required: false
                  description: Toolkit name
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: 'Number of items to return (default: 25, max: 100)'
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: 'Offset from the start of the list (default: 0)'
                - name: format
                  in: query
                  type: string
                  required: false
                  description: Provider format
                - name: user_id
                  in: query
                  type: string
                  required: false
                  description: User ID
                - name: include_all_versions
                  in: query
                  type: boolean
                  required: false
                  description: Include all versions of each tool
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: 'JSON metadata filter. Array fields (service_domains, operations): shorthand array or object with any_of/all_of/none_of operators (case-insensitive). Boolean fields: read_only, destructive, idempotent, open_world. Extras: case-sensitive key-value subset match.'
        - name: v1-formatted-tools-name
          path: /v1/formatted_tools/{name}
          operations:
            - name: tool-spec-formatted
              method: GET
              description: Get Formatted Tool Specification
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: Tool name
                - name: format
                  in: query
                  type: string
                  required: false
                  description: Provider format
                - name: user_id
                  in: query
                  type: string
                  required: false
                  description: User ID
        - name: v1-scheduled-tools
          path: /v1/scheduled_tools
          operations:
            - name: tool-scheduled-list
              method: GET
              description: List Scheduled Tool Executions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: 'Number of items to return (default: 25, max: 100)'
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: 'Offset from the start of the list (default: 0)'
        - name: v1-scheduled-tools-id
          path: /v1/scheduled_tools/{id}
          operations:
            - name: tool-scheduled-get
              method: GET
              description: Get Scheduled Tool Execution Details
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Scheduled execution ID
        - name: v1-tools
          path: /v1/tools
          operations:
            - name: tools-list-static
              method: GET
              description: List Static Tools
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: toolkit
                  in: query
                  type: string
                  required: false
                  description: Toolkit name
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: 'Number of items to return (default: 25, max: 100)'
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: 'Offset from the start of the list (default: 0)'
                - name: include_format
                  in: query
                  type: array
                  required: false
                  description: Comma separated tool formats that will be included in the response.
                - name: user_id
                  in: query
                  type: string
                  required: false
                  description: User ID
                - name: include_all_versions
                  in: query
                  type: boolean
                  required: false
                  description: Include all versions of each tool
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: 'JSON metadata filter. Array fields (service_domains, operations): shorthand array or object with any_of/all_of/none_of operators (case-insensitive). Boolean fields: read_only, destructive, idempotent, open_world. Extras: case-sensitive key-value subset match.'
        - name: v1-tools-authorize
          path: /v1/tools/authorize
          operations:
            - name: tool-authorize
              method: POST
              description: Authorize Tool
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Request body.
        - name: v1-tools-execute
          path: /v1/tools/execute
          operations:
            - name: tool-execute
              method: POST
              description: Execute Tool
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Request body.
        - name: v1-tools-requirements
          path: /v1/tools/requirements
          operations:
            - name: tool-requirements
              method: POST
              description: Check Tool Requirements
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Request body.
        - name: v1-tools-name
          path: /v1/tools/{name}
          operations:
            - name: tool-spec
              method: GET
              description: Get Arcade Tool Specification
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: Tool name
                - name: include_format
                  in: query
                  type: array
                  required: false
                  description: Comma separated tool formats that will be included in the response.
                - name: user_id
                  in: query
                  type: string
                  required: false
                  description: User ID
