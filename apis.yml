name: Arcade
description: >
  Arcade.dev is the MCP runtime for production AI agent deployments. The Arcade Engine — a hosted or self-hostable API
  surface — handles OAuth user authorization, manages user tokens, and exposes 7,000+ pre-built integrations as Model
  Context Protocol tools that agent frameworks like LangChain, OpenAI Agents, CrewAI, AG2, Google ADK, Vercel AI,
  Mastra, and TanStack AI can call. This profile catalogs the public Arcade Engine API (39 endpoints across Admin,
  Authorization, Tools, LLM, Operations, Hooks, Gateways, and Plugins), the ArcadeAI GitHub org's SDKs, the arcade-mcp
  framework, and the public schemas repo.
