externalDocs:
  description: Documentation
  url: https://docs.arcade.dev
servers:
  - url: https://api.arcade.dev
components:
  securitySchemes:
    Bearer:
      description: 'Enter your API key or API token in the format: Bearer <token>'
      type: apiKey
      name: Authorization
      in: header
  schemas:
    auth.AuthorizationContext:
      type: object
      properties:
        token:
          type: string
        user_info:
          type: object
          additionalProperties: true
    auth.AuthorizationRequirement:
      type: object
      properties:
        id:
          description: one of ID or ProviderID must be set
          type: string
        oauth2:
          $ref: '#/components/schemas/auth.OAuth2AuthorizationRequirement'
        provider_id:
          description: one of ID or ProviderID must be set
          type: string
        provider_type:
          type: string
    auth.AuthorizationResponse:
      type: object
      properties:
        context:
          $ref: '#/components/schemas/auth.AuthorizationContext'
        id:
          type: string
        provider_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          default: pending
          allOf:
            - $ref: '#/components/schemas/auth.AuthorizationStatus'
        url:
          type: string
        user_id:
          type: string
    auth.AuthorizationStatus:
      type: string
      enum:
        - not_started
        - pending
        - completed
        - failed
      x-enum-varnames:
        - StatusNotStarted
        - StatusPending
        - StatusCompleted
        - StatusFailed
    auth.OAuth2AuthorizationRequirement:
      type: object
      properties:
        scopes:
          type: array
          items:
            type: string
    auth.Status:
      type: string
      enum:
        - active
        - inactive
      x-enum-varnames:
        - StatusActive
        - StatusInactive
    identity.BindingType:
      type: string
      enum:
        - static
        - tenant
        - project
        - account
      x-enum-varnames:
        - StaticBindingType
        - TenantBindingType
        - ProjectBindingType
        - AccountBindingType
    plugins.FailureMode:
      type: string
      enum:
        - fail_closed
        - fail_open
      x-enum-varnames:
        - FailureModeClosed
        - FailureModeOpen
    plugins.HookPointStatus:
      type: string
      enum:
        - inactive
        - active
      x-enum-varnames:
        - HookPointStatusInactive
        - HookPointStatusActive
    plugins.Phase:
      type: string
      enum:
        - before
        - after
      x-enum-varnames:
        - PhaseBefore
        - PhaseAfter
    plugins.PluginStatus:
      type: string
      enum:
        - inactive
        - active
      x-enum-varnames:
        - PluginStatusInactive
        - PluginStatusActive
    schemas.ArbitraryObject:
      type: object
      additionalProperties: true
    schemas.AuthProviderCreateRequest:
      type: object
      required:
        - id
      properties:
        description:
          type: string
          maxLength: 1000
        external_id:
          description: The unique external ID for the auth provider
          type: string
          maxLength: 50
        id:
          type: string
          maxLength: 100
        oauth2:
          $ref: '#/components/schemas/schemas.OAuth2ConfigCreateRequest'
        provider_id:
          type: string
        status:
          type: string
        type:
          type: string
    schemas.AuthProviderPatchRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 1000
        id:
          type: string
          maxLength: 100
        oauth2:
          $ref: '#/components/schemas/schemas.OAuth2ConfigPatchRequest'
        provider_id:
          type: string
        status:
          type: string
        type:
          type: string
    schemas.AuthProviderResponse:
      type: object
      properties:
        binding:
          $ref: '#/components/schemas/schemas.BindingResponse'
        created_at:
          type: string
        description:
          type: string
        id:
          type: string
        oauth2:
          $ref: '#/components/schemas/schemas.OAuth2ConfigResponse'
        provider_id:
          type: string
        status:
          type: string
        type:
          type: string
        updated_at:
          type: string
    schemas.AuthorizationConfirmUserRequest:
      type: object
      required:
        - flow_id
        - user_id
      properties:
        flow_id:
          type: string
        user_id:
          type: string
    schemas.AuthorizationConfirmUserResponse:
      type: object
      required:
        - auth_id
      properties:
        auth_id:
          type: string
        next_uri:
          type: string
    schemas.AuthorizationInitiationRequest:
      type: object
      required:
        - auth_requirement
        - user_id
      properties:
        auth_requirement:
          $ref: '#/components/schemas/auth.AuthorizationRequirement'
        next_uri:
          description: 'Optional: if provided, the user will be redirected to this URI after authorization'
          type: string
        user_id:
          type: string
    schemas.AuthorizationRequirement:
      type: object
      properties:
        id:
          type: string
        oauth2:
          $ref: '#/components/schemas/schemas.OAuth2AuthorizationRequirement'
        provider_id:
          type: string
        provider_type:
          type: string
        status:
          default: disabled
          allOf:
            - $ref: '#/components/schemas/auth.Status'
        status_reason:
          type: string
        token_status:
          $ref: '#/components/schemas/auth.AuthorizationStatus'
    schemas.AuthorizationRequirementResult:
      type: object
      properties:
        authorization_id:
          type: string
        met:
          type: boolean
        provider_id:
          type: string
        provider_type:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/auth.Status'
        token_status:
          $ref: '#/components/schemas/auth.AuthorizationStatus'
        tool_names:
          type: array
          items:
            type: string
        url:
          type: string
    schemas.AuthorizationRequirementsInfo:
      type: object
      properties:
        items:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/schemas.AuthorizationRequirementResult'
        met:
          type: boolean
    schemas.AuthorizeToolRequest:
      type: object
      required:
        - tool_name
      properties:
        next_uri:
          description: 'Optional: if provided, the user will be redirected to this URI after authorization'
          type: string
        tool_name:
          type: string
        tool_version:
          description: 'Optional: if not provided, any version is used'
          type: string
        user_id:
          description: Required only when calling with an API key
          type: string
    schemas.BindingResponse:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/identity.BindingType'
    schemas.BulkHookConfig:
      type: object
      required:
        - hook_point
        - plugin_id
      properties:
        failure_mode:
          enum:
            - fail_closed
            - fail_open
          allOf:
            - $ref: '#/components/schemas/plugins.FailureMode'
        hook_point:
          type: string
          enum:
            - tool.access
            - tool.pre
            - tool.post
        phase:
          enum:
            - before
            - after
          allOf:
            - $ref: '#/components/schemas/plugins.Phase'
        plugin_id:
          type: string
        priority:
          type: integer
          maximum: 1000
          minimum: 0
        status:
          enum:
            - active
            - inactive
          allOf:
            - $ref: '#/components/schemas/plugins.HookPointStatus'
    schemas.BulkHookResult:
      type: object
      properties:
        action:
          type: string
        error:
          type: string
        hook_id:
          type: string
        hook_point:
          type: string
        plugin_id:
          type: string
    schemas.BulkUpsertHooksRequest:
      type: object
      required:
        - configs
      properties:
        configs:
          type: array
          items:
            $ref: '#/components/schemas/schemas.BulkHookConfig'
    schemas.BulkUpsertHooksResponse:
      type: object
      properties:
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/schemas.BulkHookResult'
        success:
          type: integer
    schemas.BundleToolkitMetadata:
      type: object
      properties:
        bytes:
          type: string
        entrypoint:
          type: string
          maxLength: 256
        name:
          type: string
        type:
          type: string
          enum:
            - toolkit
            - mcp
        version:
          type: string
    schemas.ChatMessage:
      type: object
      required:
        - content
        - role
      properties:
        content:
          description: The content of the message.
          type: string
        name:
          description: tool Name
          type: string
        role:
          description: The role of the author of this message. One of system, user, tool, or assistant.
          type: string
        tool_call_id:
          description: tool_call_id
          type: string
        tool_calls:
          description: tool calls if any
          type: array
          items:
            $ref: '#/components/schemas/schemas.ModelToolCall'
    schemas.ChatRequest:
      type: object
      properties:
        frequency_penalty:
          type: number
        logit_bias:
          description: "LogitBias is must be a token id string (specified by their token ID in the tokenizer), not a word string.\nincorrect: `\"logit_bias\":{\"You\": 6}`, correct: `\"logit_bias\":{\"1639\": 6}`\nrefs: https://platform.openai.com/docs/api-reference/chat/create#chat/create-logit_bias"
          type: object
          additionalProperties:
            type: integer
        logprobs:
          description: "LogProbs indicates whether to return log probabilities of the output tokens or not.\nIf true, returns the log probabilities of each output token returned in the content of message.\nThis option is currently not available on the gpt-4-vision-preview model."
          type: boolean
        max_tokens:
          type: integer
        messages:
          type: array
          items:
            $ref: '#/components/schemas/schemas.ChatMessage'
        model:
          type: string
        n:
          type: integer
        parallel_tool_calls:
          description: 'Disable the default behavior of parallel tool calls by setting it: false.'
          type: boolean
        presence_penalty:
          type: number
        response_format:
          $ref: '#/components/schemas/schemas.ResponseFormat'
        seed:
          type: integer
        stop:
          type: array
          items:
            type: string
        stream:
          type: boolean
        stream_options:
          description: 'Options for streaming response. Only set this when you set stream: true.'
          allOf:
            - $ref: '#/components/schemas/schemas.StreamOptions'
        temperature:
          type: number
        tool_choice:
          description: This can be either a string or an ToolChoice object.
        tools: {}
        top_logprobs:
          description: "TopLogProbs is an integer between 0 and 5 specifying the number of most likely tokens to return at each\ntoken position, each with an associated log probability.\nlogprobs must be set to true if this parameter is used."
          type: integer
        top_p:
          type: number
        user:
          type: string
    schemas.ChatResponse:
      type: object
      properties:
        choices:
          type: array
          items:
            $ref: '#/components/schemas/schemas.Choice'
        created:
          type: integer
        id:
          type: string
        model:
          type: string
        object:
          type: string
        system_fingerprint:
          type: string
        usage:
          $ref: '#/components/schemas/schemas.Usage'
    schemas.Choice:
      type: object
      properties:
        finish_reason:
          type: string
        index:
          type: integer
        logprobs: {}
        message:
          $ref: '#/components/schemas/schemas.ChatMessage'
        tool_authorizations:
          type: array
          items:
            $ref: '#/components/schemas/auth.AuthorizationResponse'
        tool_messages:
          type: array
          items:
            $ref: '#/components/schemas/schemas.ChatMessage'
    schemas.CreateDiscoveryRequest:
      type: object
      properties:
        allowed_classes:
          type: array
          maxItems: 10
          items:
            type: string
        enabled:
          type: boolean
        pinned_asset_keys:
          type: array
          maxItems: 500
          items:
            type: string
    schemas.CreateGatewayRequest:
      type: object
      required:
        - name
      properties:
        allowed_passthrough_headers:
          type: array
          maxItems: 100
          uniqueItems: true
          items:
            type: string
        auth_type:
          type: string
          enum:
            - arcade
            - arcade_header
            - user_source
        consent_skip_client_ids:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            type: string
        description:
          type: string
          maxLength: 1000
        instructions:
          type: string
          maxLength: 5000
        name:
          type: string
          maxLength: 256
        slug:
          type: string
          maxLength: 256
        status:
          type: string
        tool_filter:
          $ref: '#/components/schemas/schemas.CreateToolFilterRequest'
        user_source_id:
          type: string
    schemas.CreateHookRequest:
      type: object
      required:
        - failure_mode
        - hook_point
        - name
        - phase
        - plugin_id
      properties:
        failure_mode:
          enum:
            - fail_closed
            - fail_open
          allOf:
            - $ref: '#/components/schemas/plugins.FailureMode'
        hook_point:
          type: string
          enum:
            - tool.access
            - tool.pre
            - tool.post
        name:
          type: string
          maxLength: 256
        phase:
          enum:
            - before
            - after
          allOf:
            - $ref: '#/components/schemas/plugins.Phase'
        plugin_id:
          type: string
        priority:
          type: integer
          maximum: 1000
          minimum: 0
        status:
          enum:
            - active
            - inactive
          allOf:
            - $ref: '#/components/schemas/plugins.HookPointStatus'
        timeout_ms:
          type: integer
          maximum: 30000
          minimum: 100
    schemas.CreateModelRequest:
      type: object
      required:
        - config
        - id
        - model_provider_type
      properties:
        config: {}
        id:
          type: string
        model_provider_type:
          type: string
    schemas.CreatePluginRequest:
      type: object
      required:
        - name
        - plugin_type
      properties:
        description:
          type: string
          maxLength: 1000
        name:
          type: string
          maxLength: 256
        plugin_type:
          type: string
          enum:
            - webhook
        retry:
          $ref: '#/components/schemas/schemas.CreateRetryConfigRequest'
        status:
          enum:
            - active
            - inactive
          allOf:
            - $ref: '#/components/schemas/plugins.PluginStatus'
        webhook_config:
          $ref: '#/components/schemas/schemas.CreateWebhookConfigRequest'
    schemas.CreatePluginResponse:
      type: object
      properties:
        binding:
          $ref: '#/components/schemas/schemas.BindingResponse'
        created_at:
          type: string
        created_by:
          type: string
        description:
          type: string
        health_status:
          type: string
        hooks:
          type: array
          items:
            $ref: '#/components/schemas/schemas.HookResponse'
        id:
          type: string
        name:
          type: string
        plugin_type:
          type: string
        retry:
          $ref: '#/components/schemas/schemas.RetryConfigResponse'
        status:
          $ref: '#/components/schemas/plugins.PluginStatus'
        updated_at:
          type: string
        updated_by:
          type: string
        version:
          type: integer
        webhook_config:
          $ref: '#/components/schemas/schemas.WebhookConfigResponse'
    schemas.CreateRetryConfigRequest:
      type: object
      properties:
        backoff:
          type: string
          enum:
            - fixed
            - exponential
        base_delay_ms:
          type: integer
          maximum: 10000
          minimum: 10
        enabled:
          type: boolean
        max_attempts:
          type: integer
          maximum: 10
          minimum: 1
        retry_on:
          type: array
          items:
            type: string
    schemas.CreateToolFilterRequest:
      type: object
      properties:
        allowed_tools:
          description: "Qualified tool names allowed through this gateway. Each entry must be in the\n\"Provider.ToolName\" form (for example, \"Google.SendEmail\"). Versioned tool\nnames are not yet supported."
          type: array
          maxItems: 500
          uniqueItems: true
          items:
            type: string
        discovery:
          $ref: '#/components/schemas/schemas.CreateDiscoveryRequest'
    schemas.CreateWebhookConfigRequest:
      type: object
      required:
        - endpoints
      properties:
        auth:
          $ref: '#/components/schemas/schemas.WebhookAuthRequest'
        endpoints:
          $ref: '#/components/schemas/schemas.CreateWebhookEndpointsRequest'
        health_check_path:
          type: string
    schemas.CreateWebhookEndpointsRequest:
      type: object
      properties:
        access:
          $ref: '#/components/schemas/schemas.WebhookEndpointRequest'
        post:
          $ref: '#/components/schemas/schemas.WebhookEndpointRequest'
        pre:
          $ref: '#/components/schemas/schemas.WebhookEndpointRequest'
    schemas.CreateWorkerRequest:
      type: object
      required:
        - id
      properties:
        enabled:
          type: boolean
        http:
          $ref: '#/components/schemas/schemas.HTTPWorkerConfigRequest'
        id:
          type: string
          maxLength: 100
        mcp:
          $ref: '#/components/schemas/schemas.MCPWorkerConfigCreateRequest'
        type:
          type: string
    schemas.DashboardConfigResponse:
