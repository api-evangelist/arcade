naftiko: 1.0.0-alpha2
info:
  label: Arcade Engine — Operations
  description: 'Operations surface — 3 operations. Lead operation: Get Engine Config. Self-contained Naftiko capability covering one Arcade business surface.'
  tags:
    - Arcade
    - Engine
    - Operations
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
  - namespace: env
    keys:
      ARCADE_API_KEY: ARCADE_API_KEY
capability:
  consumes:
    - type: http
      namespace: engine-operations
      baseUri: https://api.arcade.dev
      description: Arcade Engine — Operations business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.ARCADE_API_KEY}}'
      resources:
        - name: v1-config
          path: /v1/config
          operations:
            - name: engine-config
              method: GET
              description: Get Engine Config
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v1-health
          path: /v1/health
          operations:
            - name: arcade-health
              method: GET
              description: Engine Health Check
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v1-swagger
          path: /v1/swagger
          operations:
            - name: swagger
              method: GET
              description: Get Openapi Specification
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: engine-operations-rest
      port: 8080
      description: REST adapter for Arcade Engine — Operations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/config
          name: v1-config
          description: REST surface for /v1/config.
          operations:
            - method: GET
              name: engine-config
              description: Get Engine Config
              call: engine-operations.engine-config
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/health
          name: v1-health
          description: REST surface for /v1/health.
          operations:
            - method: GET
              name: arcade-health
              description: Engine Health Check
              call: engine-operations.arcade-health
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/swagger
          name: v1-swagger
          description: REST surface for /v1/swagger.
          operations:
            - method: GET
              name: swagger
              description: Get Openapi Specification
              call: engine-operations.swagger
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: engine-operations-mcp
      port: 9090
      transport: http
      description: MCP adapter for Arcade Engine — Operations. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: get-engine-config
          description: Get Engine Config
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: engine-operations.engine-config
          outputParameters:
            - type: object
              mapping: $.
        - name: engine-health-check
          description: Engine Health Check
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: engine-operations.arcade-health
          outputParameters:
            - type: object
              mapping: $.
        - name: get-openapi-specification
          description: Get Openapi Specification
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: engine-operations.swagger
          outputParameters:
            - type: object
              mapping: $.
